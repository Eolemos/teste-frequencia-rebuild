<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>&Aacute;rea de acesso</title>
  <link rel="stylesheet" href="css/member-area.css" />
  <link rel="stylesheet" href="assets/css/quiz-premium-mobile.css?v=20260705195953">
</head>
<body>
  <main>
    <h1>&Aacute;rea de acesso</h1>
    <p class="center">Carregando seu acesso...</p>

    <div id="content"></div>
  </main>

  <script src="js/member-api.js"></script>
  <script>
    const initialToken = MemberApi.getToken();
    const content = document.querySelector("#content");

    function dashboard(data) {
      const brand = MemberApi.getBrand(data);
      const progress = data.progress || {};
      const completed = (progress.completedDays || []).length;
      const bonusUnlocked = Boolean(progress.bonusUnlocked);
      const diagnosticText = data.diagnostic?.completed
        ? `${brand.diagnosticName} respondido`
        : brand.diagnosticName;
      const bonusText = bonusUnlocked
        ? `Abrir ${brand.bonusName}`
        : `${brand.bonusName} libera apos concluir 7 dias`;

      document.title = brand.memberAreaName;
      document.querySelector("h1").textContent = brand.memberAreaName;
      document.querySelector(".center").textContent = brand.isXamanico
        ? "Acesse seus materiais xamânicos, diagnóstico xamânico bônus e prática xamânica guiada."
        : "Use o token enviado por e-mail para acessar seus materiais e sua jornada.";

      content.innerHTML = `
        <div class="panel center">
          <span class="badge">Acesso vitalicio</span>
          <p>Oi, <strong>${data.name || "Ana Clara"}</strong>.</p>
          <p class="muted">${completed}/7 dias concluidos na ${brand.progressName.toLowerCase()}.</p>
        </div>

        <div class="actions">
          <a class="button" href="${MemberApi.pageUrl("entrega", data.token)}">Baixar ${brand.materialsName.toLowerCase()}</a>
          <a class="button secondary" href="${MemberApi.pageUrl("frequencia", data.token)}">${brand.isXamanico ? "Ouvir prática xamânica" : "Ouvir frequência"}</a>
          <a class="button secondary" href="${MemberApi.pageUrl("diagnostico", data.token)}">${diagnosticText}</a>
          <a class="button secondary" href="${MemberApi.pageUrl("progresso", data.token)}">${brand.progressName}</a>
          <a class="button secondary" href="${MemberApi.pageUrl("bonus", data.token)}">${bonusText}</a>
        </div>
      `;
    }

    async function boot() {
      if (!initialToken) {
        MemberApi.showTokenLogin(content);
        return;
      }

      MemberApi.setLoading(content, "Abrindo sua area...");

      try {
        const data = await MemberApi.member(initialToken);
        dashboard(data);
      } catch (error) {
        MemberApi.showError(content, error);
        const retry = document.createElement("div");
        retry.className = "actions";
        retry.innerHTML = '<button class="secondary" id="retryLogin">Tentar outro token</button>';
        content.appendChild(retry);
        document.querySelector("#retryLogin").addEventListener("click", () => {
          localStorage.removeItem("frequenciaAccessToken");
          localStorage.removeItem("frequencia_access_token");
          window.location.href = "membros.html";
        });
      }
    }

    boot();
  </script>
  <script defer src="assets/js/quiz-premium-mobile.js?v=20260705195953"></script>
</body>
</html>
