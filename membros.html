<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Área de membros</title>
  <link rel="stylesheet" href="css/member-area.css" />
</head>
<body>
  <main>
    <h1>Área de membros</h1>
    <p class="center">Use o token enviado por e-mail para acessar seus materiais e sua jornada.</p>

    <div id="content"></div>
  </main>

  <script src="js/member-api.js"></script>
  <script>
    const initialToken = MemberApi.getToken();
    const content = document.querySelector("#content");

    function loginForm() {
      content.innerHTML = `
        <form id="loginForm" class="panel">
          <label>
            Token enviado por e-mail
            <input name="token" autocomplete="one-time-code" required />
          </label>
          <button type="submit">Entrar</button>
        </form>
      `;

      document.querySelector("#loginForm").addEventListener("submit", (event) => {
        event.preventDefault();
        const token = MemberApi.setToken(event.currentTarget.elements.token.value);
        window.location.href = MemberApi.pageUrl("membros", token);
      });
    }

    function dashboard(data) {
      const progress = data.progress || {};
      const completed = (progress.completedDays || []).length;
      const diagnosticText = data.diagnostic?.completed
        ? "Diagnostico respondido"
        : "Responder diagnostico bonus";

      content.innerHTML = `
        <div class="panel center">
          <span class="badge">Acesso vitalicio</span>
          <p>Oi, <strong>${data.name || "Ana Clara"}</strong>.</p>
          <p class="muted">${completed}/7 dias concluidos na jornada de frequencia.</p>
        </div>

        <div class="actions">
          <a class="button" href="${MemberApi.pageUrl("frequencia", data.token)}">Ouvir frequência</a>
          <a class="button secondary" href="${MemberApi.pageUrl("diagnostico", data.token)}">${diagnosticText}</a>
          <a class="button secondary" href="${MemberApi.pageUrl("progresso", data.token)}">Ver progresso</a>
          <a class="button secondary" href="${MemberApi.pageUrl("entrega", data.token)}">Baixar materiais</a>
          <a class="button secondary" href="${MemberApi.pageUrl("bonus", data.token)}">Bônus secreto</a>
        </div>
      `;
    }

    async function boot() {
      if (!initialToken) {
        loginForm();
        return;
      }

      MemberApi.setLoading(content, "Abrindo sua area...");

      try {
        const data = await MemberApi.member(initialToken);
        dashboard(data);
      } catch (error) {
        MemberApi.showError(content, error);
        const retry = document.createElement("div");
        retry.className = "actions";
        retry.innerHTML = '<button class="secondary" id="retryLogin">Tentar outro token</button>';
        content.appendChild(retry);
        document.querySelector("#retryLogin").addEventListener("click", () => {
          localStorage.removeItem("frequencia_access_token");
          window.location.href = "membros.html";
        });
      }
    }

    boot();
  </script>
</body>
</html>
