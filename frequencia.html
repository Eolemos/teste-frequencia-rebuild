<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>&Aacute;rea de acesso</title>
  <link rel="stylesheet" href="css/member-area.css" />
  <link rel="stylesheet" href="assets/css/quiz-premium-mobile.css?v=20260705195953">
</head>
<body>
  <main>
    <h1>&Aacute;rea de acesso</h1>
    <p class="center">Carregando sua pr&aacute;tica...</p>

    <div id="content"></div>
  </main>

  <script src="js/member-api.js"></script>
  <script>
    const token = MemberApi.getToken();
    const content = document.querySelector("#content");
    let heartbeatTimer = null;
    let audio = null;
    let currentBrand = MemberApi.getBrand({});

    function stopHeartbeat() {
      if (heartbeatTimer) window.clearInterval(heartbeatTimer);
      heartbeatTimer = null;
    }

    function progressPercent(state) {
      const required = Number(state.requiredListenSecondsPerDay || 3600);
      const listened = Number(state.listenSeconds || 0);
      return Math.min(100, Math.round((listened / required) * 100));
    }

    function renderState(state) {
      const completedDays = state.completedDays || [];
      const percent = progressPercent(state);
      const required = Number(state.requiredListenSecondsPerDay || 3600);
      const listened = Number(state.listenSeconds || 0);
      const currentDay = state.currentDay || Math.min(completedDays.length + 1, 7);
      const lockedMessage = state.nextDayUnlockAt
        ? `<p class="muted">Proximo dia libera em ${MemberApi.formatDate(state.nextDayUnlockAt)}.</p>`
        : "";
      const bonusLink = document.querySelector("#bonusLink");

      document.querySelector("#progressInfo").innerHTML = `
        <p><strong>Dia atual:</strong> ${currentDay} de 7</p>
        <div class="progressbar"><span style="width:${percent}%"></span></div>
        <p class="muted">${MemberApi.secondsLabel(listened)} contabilizados de ${MemberApi.secondsLabel(required)}.</p>
        <p class="muted">${completedDays.length}/7 dias concluidos.</p>
        ${lockedMessage}
      `;

      if (bonusLink) {
        bonusLink.hidden = false;
        bonusLink.textContent = state.bonusUnlocked
          ? `Abrir ${currentBrand.bonusName}`
          : `${currentBrand.bonusName} libera apos concluir 7 dias`;
      }
    }

    async function sendHeartbeat() {
      if (!audio || audio.paused) return;

      try {
        const response = await MemberApi.heartbeat(token, 10);
        const state = response.progress || response;
        renderState(state);
      } catch (error) {
        stopHeartbeat();
        MemberApi.showError(document.querySelector("#message"), error);
      }
    }

    function renderPlayer(data) {
      currentBrand = MemberApi.getBrand(data);
      document.title = currentBrand.frequencyName;
      document.querySelector("h1").textContent = currentBrand.frequencyName;
      document.querySelector(".center").textContent = currentBrand.isXamanico
        ? "Prática xamânica guiada para sua jornada de 7 dias."
        : "Sessao de frequencia - 60 minutos";

      content.innerHTML = `
        <div class="panel center">
          <span class="badge">${currentBrand.frequencyName}</span>
          <p>Oi, <strong>${data.name || "Ana Clara"}</strong>. Coloque o audio para tocar e mantenha a ${currentBrand.isXamanico ? "prática xamânica" : "sessao"} ativa.</p>
          <audio id="frequencyAudio" loop preload="auto"></audio>
          <div class="actions">
            <button id="playButton">${currentBrand.isXamanico ? "Iniciar prática" : "Iniciar sessao"}</button>
            <button id="pauseButton" class="secondary" disabled>Pausar</button>
          </div>
        </div>

        <div id="progressInfo" class="panel"></div>
        <div id="message"></div>

        <div class="actions">
          <a class="button secondary" href="${MemberApi.pageUrl("progresso", token)}">${currentBrand.progressName}</a>
          <a id="bonusLink" class="button secondary" href="${MemberApi.pageUrl("bonus", token)}">${currentBrand.bonusName} libera apos concluir 7 dias</a>
          ${MemberApi.backToPanelHtml(token)}
        </div>
      `;

      audio = document.querySelector("#frequencyAudio");
      audio.src = data.audioUrl;
      renderState(data);

      document.querySelector("#playButton").addEventListener("click", async () => {
        const playButton = document.querySelector("#playButton");
        const pauseButton = document.querySelector("#pauseButton");
        playButton.disabled = true;
        playButton.textContent = "Carregando...";
        try {
          await audio.play();
          playButton.textContent = currentBrand.isXamanico ? "Prática em andamento" : "Sessao em andamento";
          pauseButton.disabled = false;
          await sendHeartbeat();
          stopHeartbeat();
          heartbeatTimer = window.setInterval(sendHeartbeat, 10000);
        } catch (error) {
          playButton.disabled = false;
          playButton.textContent = currentBrand.isXamanico ? "Iniciar prática" : "Iniciar sessao";
          MemberApi.showError(document.querySelector("#message"), error);
        }
      });

      document.querySelector("#pauseButton").addEventListener("click", () => {
        audio.pause();
        stopHeartbeat();
        document.querySelector("#playButton").disabled = false;
        document.querySelector("#playButton").textContent = currentBrand.isXamanico ? "Continuar prática" : "Continuar sessao";
        document.querySelector("#pauseButton").disabled = true;
      });
    }

    async function boot() {
      if (!token) {
        MemberApi.showTokenLogin(content);
        return;
      }

      MemberApi.setLoading(content, "Abrindo sua sessao...");

      try {
        const data = await MemberApi.frequency(token);
        renderPlayer(data);
      } catch (error) {
        MemberApi.showError(content, error);
      }
    }

    window.addEventListener("beforeunload", stopHeartbeat);
    boot();
  </script>
  <script defer src="assets/js/quiz-premium-mobile.js?v=20260705195953"></script>
</body>
</html>
