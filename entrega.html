<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>&Aacute;rea de acesso</title>
  <link rel="stylesheet" href="css/member-area.css" />
  <link rel="stylesheet" href="assets/css/quiz-premium-mobile.css?v=20260705195953">
</head>
<body>
  <main>
    <h1>&Aacute;rea de acesso</h1>
    <p class="center">Buscando seus materiais...</p>

    <div id="content"></div>
  </main>

  <script src="js/member-api.js"></script>
  <script>
    const token = MemberApi.getToken();
    const content = document.querySelector("#content");

    function cleanLabel(text) {
      return String(text || "")
        .replace(/_/g, " ")
        .replace(/\.pdf$/i, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function labelFromKey(key) {
      const labels = {
        mapa: "Mapa Completo de Frequências Vibracionais",
        leitura: "Guia Vibracional do Nome",
        guia: "Guia Vibracional do Nome",
        prosperidade: "Livro dos Caminhos de Luz e Prosperidade",
        protecao: "Livro da Proteção Espiritual e Fortalecimento Interior",
        proteção: "Livro da Proteção Espiritual e Fortalecimento Interior",
        jornada: "Livro da Jornada Sagrada dos 7 Dias",
        bonus: "Depois dos 7 Dias"
      };

      const k = String(key || "").toLowerCase();

      if (labels[k]) return labels[k];
      if (k.includes("mapa")) return labels.mapa;
      if (k.includes("guia") || k.includes("leitura")) return labels.guia;
      if (k.includes("prosperidade") || k.includes("caminhos")) return labels.prosperidade;
      if (k.includes("protecao") || k.includes("proteção") || k.includes("fortalecimento")) return labels.protecao;
      if (k.includes("jornada") || k.includes("7 dias")) return labels.jornada;
      if (k.includes("bonus") || k.includes("bônus") || k.includes("depois")) return labels.bonus;

      return cleanLabel(key) || "Material personalizado";
    }

    function normalizeMaterials(data) {
      const result = [];
      const seen = new Set();

      function addItem(item, fallbackKey) {
        if (!item) return;

        let url = "";
        let label = "";
        let locked = false;
        let unlockText = "";

        if (typeof item === "string") {
          url = item;
          label = labelFromKey(fallbackKey || item);
        } else {
          url = item.url || item.href || item.downloadUrl || item.downloadURL || item.link || "";
          label = item.label || item.title || item.name || item.filename || item.fileName || labelFromKey(fallbackKey || item.id || item.key);
          locked = Boolean(item.locked || item.isLocked || item.available === false || item.unlocked === false);
          unlockText = item.unlockText || item.lockedText || item.message || item.availableAtText || "";
        }

        if (!label) label = labelFromKey(fallbackKey || url);
        const id = `${label}|${url}`;

        if (seen.has(id)) return;
        seen.add(id);

        result.push({ label, url, locked, unlockText });
      }

      const arrays = [
        data.materials,
        data.files,
        data.pdfs,
        data.downloads,
        data.deliveryFiles,
        data.generatedFiles,
        data.delivery && data.delivery.files,
        data.delivery && data.delivery.pdfs,
        data.delivery && data.delivery.downloads
      ];

      arrays.forEach((arr) => {
        if (Array.isArray(arr)) arr.forEach((item) => addItem(item));
      });

      const downloadUrls = data.downloadUrls || data.downloadURLS || data.urls || {};
      Object.keys(downloadUrls).forEach((key) => addItem(downloadUrls[key], key));

      const bonus =
        data.bonus ||
        data.bonusPdf ||
        data.bonusDownload ||
        data.lockedBonus ||
        data.afterSevenDaysBonus;

      if (bonus) addItem(bonus, "bonus");

      return result;
    }

    function normalizeText(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/_/g, " ")
        .replace(/\.pdf$/i, "")
        .replace(/\s+/g, " ")
        .toLowerCase()
        .trim();
    }

    function labelFromKey(key) {
      const text = normalizeText(key);

      if (text.includes("mapa")) {
        return "Mapa Completo de Frequências Vibracionais";
      }

      if (text.includes("guia") || text.includes("leitura") || text.includes("nome")) {
        return "Guia Vibracional do Nome";
      }

      if (text.includes("caminhos") || text.includes("prosperidade")) {
        return "Livro dos Caminhos de Luz e Prosperidade";
      }

      if (text.includes("protecao") || text.includes("fortalecimento")) {
        return "Livro da Proteção Espiritual e Fortalecimento Interior";
      }

      if (text.includes("jornada") || text.includes("sagrada")) {
        return "Livro da Jornada Sagrada dos 7 Dias";
      }

      if (text.includes("bonus") || text.includes("depois")) {
        return "Depois dos 7 Dias";
      }

      return String(key || "Material personalizado")
        .replace(/_/g, " ")
        .replace(/\.pdf$/i, "")
        .trim();
    }

    function collectMaterials(data) {
      const list = [];

      function add(item, fallbackKey) {
        if (!item) return;

        if (typeof item === "string") {
          list.push({
            key: fallbackKey || item,
            label: labelFromKey(fallbackKey || item),
            url: item,
            locked: false,
            isBonus: normalizeText(fallbackKey || item).includes("bonus")
          });
          return;
        }

        const key = item.key || item.id || item.type || fallbackKey || item.filename || item.fileName || item.name || item.title || "";
        const label = item.label || item.title || item.name || item.filename || item.fileName || labelFromKey(key);
        const url = item.url || item.href || item.downloadUrl || item.downloadURL || item.link || "";
        const locked = Boolean(item.locked || item.isLocked || item.available === false || item.unlocked === false);
        const isBonus = Boolean(item.isBonus || item.bonus || normalizeText(key + " " + label).includes("bonus") || normalizeText(key + " " + label).includes("depois dos 7 dias"));

        list.push({
          key,
          label,
          url,
          locked,
          isBonus,
          unlockText: item.unlockText || item.lockedText || item.message || item.availableAtText || ""
        });
      }

      const downloadUrls = data.downloadUrls || data.downloadURLS || data.urls || {};
      Object.keys(downloadUrls).forEach((key) => add(downloadUrls[key], key));

      const arrays = [
        data.materials,
        data.files,
        data.pdfs,
        data.downloads,
        data.deliveryFiles,
        data.generatedFiles,
        data.delivery && data.delivery.files,
        data.delivery && data.delivery.pdfs,
        data.delivery && data.delivery.downloads
      ];

      arrays.forEach((arr) => {
        if (Array.isArray(arr)) arr.forEach((item) => add(item));
      });

      const bonus =
        data.bonus ||
        data.bonusPdf ||
        data.bonusDownload ||
        data.lockedBonus ||
        data.afterSevenDaysBonus;

      if (bonus) add(bonus, "bonus");

      return list;
    }

    function findMaterial(materials, terms, usedUrls) {
      let best = null;
      let bestScore = 0;

      materials.forEach((item) => {
        const haystack = normalizeText([
          item.key,
          item.label,
          item.url
        ].join(" "));

        let score = 0;
        terms.forEach((term) => {
          if (haystack.includes(normalizeText(term))) score++;
        });

        if (item.url && usedUrls.has(item.url)) score = 0;

        if (score > bestScore) {
          best = item;
          bestScore = score;
        }
      });

      return bestScore > 0 ? best : null;
    }

    function renderDownloadButton(item, label) {
      if (!item || !item.url) {
        return `
          <div class="panel center">
            <span class="badge">Material em preparação</span>
            <p><strong>${label}</strong></p>
            <p class="muted">Este arquivo ainda não veio do servidor. Gere novamente a entrega ou aguarde alguns instantes.</p>
          </div>
        `;
      }

      if (item.locked) {
        return `
          <div class="panel center">
            <span class="badge">Bônus bloqueado</span>
            <p><strong>${label}</strong></p>
            <p class="muted">${item.unlockText || "Disponível após completar seus 7 dias de prática."}</p>
          </div>
        `;
      }

      return `<a class="button" href="${item.url}" target="_blank" rel="noopener">Baixar ${label}</a>`;
    }

    function materialLinks(data) {
      const brand = MemberApi.getBrand(data);
      document.title = brand.materialsName;
      document.querySelector("h1").textContent = brand.materialsName;
      document.querySelector(".center").textContent = brand.isXamanico
        ? "Baixe seus materiais xamânicos personalizados e acesse seu Portal Xamânico."
        : "Baixe seus PDFs personalizados e acesse sua jornada de frequencia.";

      const materials = collectMaterials(data);
      const usedUrls = new Set();

      const expectedBooks = [
        {
          label: brand.isXamanico ? "Mapa Xamânico Personalizado" : "Mapa Completo de Frequências Vibracionais",
          terms: ["mapa", "frequencias", "vibracionais"]
        },
        {
          label: brand.mainMaterialName,
          terms: ["guia", "leitura", "nome"]
        },
        {
          label: brand.isXamanico ? "Mapa Xamânico da Prosperidade pelo Nome" : "Livro dos Caminhos de Luz e Prosperidade",
          terms: ["caminhos", "luz", "prosperidade"]
        },
        {
          label: brand.isXamanico ? "Ritual Xamânico de Proteção Espiritual do Nome" : "Livro da Proteção Espiritual e Fortalecimento Interior",
          terms: ["protecao", "espiritual", "fortalecimento", "interior"]
        },
        {
          label: brand.isXamanico ? "Protocolo Xamânico de Ativação Vibracional — 21 Dias" : "Livro da Jornada Sagrada dos 7 Dias",
          terms: ["jornada", "sagrada", "7 dias"]
        }
      ];

      const buttons = expectedBooks.map((book) => {
        const item = findMaterial(materials, book.terms, usedUrls);
        if (item && item.url) usedUrls.add(item.url);
        return renderDownloadButton(item, book.label);
      }).join("");

      const bonusItem = materials.find((item) => item.isBonus && !usedUrls.has(item.url));
      const bonusHtml = bonusItem ? renderDownloadButton(bonusItem, brand.afterSevenDaysName) : "";

      return `
        <div class="panel center">
          <span class="badge">Entrega liberada</span>
          <p>Oi, <strong>${data.name || "Gabriel"}</strong>.</p>
          <p class="muted">${brand.materialsName} preparados com sucesso.</p>
        </div>

        <div class="actions">
          ${buttons}
          ${bonusHtml}
          <a class="button secondary" href="${MemberApi.pageUrl("membros", token)}">Acessar ${brand.memberAreaName}</a>
          ${MemberApi.backToPanelHtml(token)}
        </div>
      `;
    }

    async function boot() {
      if (!token) {
        MemberApi.showTokenLogin(content);
        return;
      }

      MemberApi.setLoading(content, "Buscando seus materiais...");

      try {
        const data = await MemberApi.delivery(token);
        content.innerHTML = materialLinks(data);
      } catch (error) {
        content.innerHTML = `
          <div class="panel error">
            <strong>Materiais ainda nao encontrados.</strong>
            <p>${error.message}</p>
          </div>
          <div class="actions">
            <button id="generateButton">Gerar meus materiais agora</button>
            ${MemberApi.backToPanelHtml(token)}
          </div>
        `;

        document.querySelector("#generateButton").addEventListener("click", async () => {
          const button = document.querySelector("#generateButton");
          button.disabled = true;
          button.textContent = "Preparando seus dados...";
          try {
            await MemberApi.generateDelivery(token);
            const data = await MemberApi.delivery(token);
            content.innerHTML = materialLinks(data);
          } catch (generationError) {
            MemberApi.showError(content, generationError);
          }
        });
      }
    }

    boot();
  </script>
  <script defer src="assets/js/quiz-premium-mobile.js?v=20260705195953"></script>
</body>
</html>
